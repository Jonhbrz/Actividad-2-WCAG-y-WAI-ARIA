<!DOCTYPE html>
<html lang="es">
<head>
  <title>Notificaciones</title>
  <script>
    function mostrarNotificacion() {
      document.getElementById('notificacion').innerText = 'Cambio guardado';
    }
  </script>
</head>
<body>

  <button onclick="mostrarNotificacion()">Guardar</button>

  <!-- aria-live permite anunciar cambios dinámicos -->
  <!-- role="status" indica que es información no crítica -->
  <div id="notificacion" role="status" aria-live="polite"></div>

</body>
</html>
