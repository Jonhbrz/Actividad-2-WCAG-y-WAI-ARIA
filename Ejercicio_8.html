<!DOCTYPE html>
<html lang="es">
<head>
  <title>Menú</title>
  <script>
    function toggleMenu(btn) {
      const menu = document.getElementById('submenu');
      const expanded = btn.getAttribute('aria-expanded') === 'true';

      btn.setAttribute('aria-expanded', !expanded);
      menu.hidden = expanded;
    }
  </script>
</head>
<body>

  <h1>Menú</h1>

  <!-- Botón accesible con estado -->
  <button aria-expanded="false" aria-controls="submenu" onclick="toggleMenu(this)">
    Opciones
  </button>

  <!-- hidden controla visibilidad accesible -->
  <div id="submenu" hidden>
    <p>Opción 1</p>
    <p>Opción 2</p>
  </div>

</body>
</html>
